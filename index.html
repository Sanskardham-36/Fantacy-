<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantacy Tebal - Jatin Solanki</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* Modern & Beautiful CSS */
        :root { 
            --primary: #1e3a8a; 
            --accent: #d97706; 
            --green: #10b981; 
            --red: #ef4444; 
            --bg: #f1f5f9; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, var(--primary), #1d4ed8); color: white; padding: 25px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .header small { font-size: 14px; opacity: 0.8; }
        
        .main-container { flex-grow: 1; max-width: 600px; margin: 20px auto; width: 95%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* Login Screen */
        #loginScreen { text-align: center; padding: 50px 0; }
        #loginScreen h2 { color: var(--primary); margin-bottom: 30px; }
        .login-box { background: #fff; padding: 30px; border-radius: 15px; border: 1px solid #e2e8f0; }

        /* Dashboard Screen */
        #dashboardScreen { display: none; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; border-radius: 10px; overflow: hidden; font-size: 15px; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; padding: 15px; border-bottom: 1px solid #e2e8f0; font-weight: 600; text-transform: uppercase; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
        tr:nth-child(even) { background-color: #f8fafc; }
        tr:hover { background-color: #eff6ff; }
        
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px currentColor; }
        .dot-green { background: var(--green); color: var(--green); }
        .dot-red { background: var(--red); color: var(--red); }
        
        .deposit-amt { font-weight: bold; color: var(--primary); font-size: 16px; background: #dbeafe; padding: 6px 12px; border-radius: 6px; }

        /* Admin Section & Buttons */
        .admin-section { background-color: #fefce8; padding: 20px; border-radius: 15px; border: 2px dashed #f59e0b; margin-top: 20px; display: none; }
        .admin-section h3 { margin-top: 0; color: #92400e; font-size: 18px; text-align: center; }
        
        input { width: 90%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        
        .btn { border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; text-transform: uppercase; transition: 0.2s; color: white; margin: 5px; }
        .btn:active { transform: scale(0.97); }
        
        .btn-primary { background: var(--primary); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); }
        .btn-primary:hover { background: #1d4ed8; }
        
        .btn-accent { background: var(--accent); color: black; box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3); }
        .btn-accent:hover { background: #f59e0b; }
        
        .btn-winner { background: linear-gradient(135deg, gold, #f59e0b); color: #1e293b; width: 100%; font-size: 16px; letter-spacing: 1px; }

        /* Footer */
        footer { text-align: center; padding: 25px; color: #475569; font-weight: 700; border-top: 1px solid #e2e8f0; background: white; margin-top: auto; font-size: 14px; }
        footer span { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Fantacy Tebal</h1>
        <small>Real-time Ledger System</small>
    </div>

    <div class="main-container">

        <div id="loginScreen">
            <h2>લોગિન કરો</h2>
            <div class="login-box">
                <p style="color: #64748b; margin-bottom: 20px;">જો તમે એડમિન હોવ તો પાસવર્ડ નાખો, અથવા સીધા ટેબલ જુઓ.</p>
                <input type="password" id="loginPass" placeholder="પાસવર્ડ નાખો (556644)">
                <br><br>
                <button class="btn btn-primary" onclick="checkLogin()">Admin Login</button>
                <br><br>
                <button class="btn" style="background:#e2e8f0; color:#1e293b;" onclick="skipLogin()">ફક્ત ટેબલ જુઓ</button>
            </div>
        </div>

        <div id="dashboardScreen">
            <h3 style="text-align:center; color:#475569;">પ્લેયર્સ ડિપોઝિટ ટેબલ</h3>
            
            <table>
                <thead>
                    <tr>
                        <th>ક્રમ</th>
                        <th>નામ</th>
                        <th>ID</th>
                        <th>ડિપોઝિટ</th>
                        <th>સ્ટેટસ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>

            <div id="adminSection" class="admin-section">
                <h3>🔒 એડમિન કંટ્રોલ</h3>
                <p style="font-size: 13px; color: #92400e; text-align: center;">નવો પ્લેયર ઉમેરવા માટે:</p>
                <input type="text" id="pName" placeholder="પ્લેયરનું નામ">
                <input type="text" id="pID" placeholder="પ્લેયર ID (દા.ત. 101, P1)">
                <button class="btn btn-primary" style="width:100%" onclick="addPlayer()">પ્લેયર ઉમેરો</button>
                
                <hr style="margin: 20px 0; border: 0.5px solid #d9770633;">
                
                <button class="btn btn-winner" onclick="setWinner()">🏆 વિનર એન્ટ્રી / ડિપોઝિટ વધારો</button>
            </div>
            
            <button class="btn" style="background:#eee; color:black; font-size:12px; margin-top:15px; width:100%; border-radius:5px" onclick="logout()">લોગઆઉટ / પ્લેયર મોડ</button>
        </div>

    </div>

    <footer>Jatin Solanki <span>By Version</span></footer>

<script>
    // Firebase Configuration (તમે સેટ કરેલી વિગતો)
    const firebaseConfig = {
        apiKey: "AIzaSyBfjRsS0vdY6slU3HxA3oj60Fz93VF0-74",
        authDomain: "fantacy-ea756.firebaseapp.com",
        projectId: "fantacy-ea756",
        storageBucket: "fantacy-ea756.firebasestorage.app",
        messagingSenderId: "1074108626187",
        appId: "1:1074108626187:web:ab1c22b78ea4cb4f3f5e0e",
        measurementId: "G-EKB18RQBMV",
        databaseURL: "https://fantacy-ea756-default-rtdb.firebaseio.com/"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMIN_PASS = "556644";
    let isAdmin = false;

    // લોગિન ચેક કરવાનું ફંક્શન
    function checkLogin() {
        const pass = document.getElementById('loginPass').value;
        if(pass === ADMIN_PASS) {
            isAdmin = true;
            showDashboard();
        } else {
            alert("ખોટો પાસવર્ડ! (Hint: 556644)");
        }
    }

    // લોગિન સ્કિપ કરવાનું ફંક્શન
    function skipLogin() {
        isAdmin = false;
        showDashboard();
    }
    
    // લોગઆઉટ ફંક્શન
    function logout() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginPass').value = '';
    }

    // ડેશબોર્ડ બતાવવાનું ફંક્શન
    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        
        // જો એડમિન હોય તો જ એડમિન પેનલ બતાવવી
        if(isAdmin) {
            document.getElementById('adminSection').style.display = 'block';
        } else {
            document.getElementById('adminSection').style.display = 'none';
        }
    }

    // പ્લેયર્સનું લિસ્ટ Real-time અપડેટ કરવું
    db.ref('players').on('value', (snapshot) => {
        const data = snapshot.val();
        let playersArray = data ? Object.values(data) : [];
        
        // સોર્ટિંગ: જેની ડિપોઝિટ વધારે તે ઉપર
        playersArray.sort((a, b) => b.deposit - a.deposit);
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (playersArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5">કોઈ પ્લેયર નથી. એડમિન મોડમાં ઉમેરો.</td></tr>`;
            return;
        }

        playersArray.forEach((p, index) => {
            let dotClass = p.deposit > 0 ? 'dot-green' : 'dot-red';
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:bold">${index + 1}</td>
                    <td>${p.name}</td>
                    <td><small style="color:#64748b">${p.id}</small></td>
                    <td><span class="deposit-amt">₹${p.deposit}</span></td>
                    <td><span class="status-dot ${dotClass}"></span></td>
                </tr>
            `;
        });
    });

    // નવો પ્લેયર ઉમેરવાનું ફંક્શન (ફક્ત એડમિન માટે)
    function addPlayer() {
        if(!isAdmin) return;
        
        const name = document.getElementById('pName').value.trim();
        const id = document.getElementById('pID').value.trim();
        
        if(!name || !id) return alert("નામ અને ID બંને લખો");
        
        // ID યુનિક હોવું જોઈએ એટલે ચેક કરવું
        db.ref('players/' + id).once('value', (snap) => {
            if(snap.exists()) {
                alert("આ ID પહેલાથી વપરાયેલું છે. નવું ID આપો.");
            } else {
                db.ref('players/' + id).set({
                    id: id,
                    name: name,
                    deposit: 0
                }).then(() => {
                    alert(name + " ઉમેરાઈ ગયો!");
                    document.getElementById('pName').value = '';
                    document.getElementById('pID').value = '';
                });
            }
        });
    }

    // વિનર અથવા ડિપોઝિટ અપડેટ કરવાનું ફંક્શન (ફક્ત એડમિન માટે)
    function setWinner() {
        if(!isAdmin) return;
        
        const id = prompt("Winner ID નાખો:");
        if(!id) return;
        
        const amount = prompt("જીતેલી રકમ નાખો (₹):");
        if(!amount || isNaN(amount)) return alert("સાચી રકમ લખો");

        db.ref('players/' + id).once('value', (snap) => {
            if(snap.exists()) {
                let currentDeposit = snap.val().deposit || 0;
                db.ref('players/' + id).update({
                    deposit: currentDeposit + parseInt(amount)
                }).then(() => {
                    alert("જીત એડ થઈ ગઈ!");
                });
            } else {
                alert("આ ID વાળો કોઈ પ્લેયર નથી.");
            }
        });
    }
</script>

</body>
</html>
